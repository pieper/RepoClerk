name: Update Repo Journal

on:
  repository_dispatch:
    types: [update-repo]
  issues:
    types: [opened]

concurrency:
  group: update-repo-drain
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    # Only run for dispatches or issues with the update-request label
    if: |
      github.event_name == 'repository_dispatch' ||
      (github.event_name == 'issues' &&
       contains(github.event.issue.labels.*.name, 'update-request'))
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout RepoClerk
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Ensure update-request label exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create update-request \
            --repo "$GITHUB_REPOSITORY" \
            --color "0075ca" \
            --description "Queued journal update" 2>/dev/null || true

      - name: Run drain loop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          INITIAL_OWNER: ${{ github.event.client_payload.owner }}
          INITIAL_REPO: ${{ github.event.client_payload.repo }}
        run: python3 scripts/drain.py

      - name: Generate dashboard
        run: python3 scripts/generate-dashboard.py

      - name: Commit and push dashboard
        run: |
          git add docs/
          git diff --cached --quiet && { echo "No dashboard changes"; exit 0; }
          git commit -m "Regenerate dashboard"
          if git push; then exit 0; fi
          # Push rejected — remote has new commits (likely another drain loop run).
          # Undo our commit, pull the latest journals, regenerate fresh, then push.
          git reset HEAD~1
          git pull --rebase
          python3 scripts/generate-dashboard.py
          git add docs/
          git diff --cached --quiet && { echo "No dashboard changes after pull"; exit 0; }
          git commit -m "Regenerate dashboard"
          git push
