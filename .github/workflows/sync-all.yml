name: Sync All MorphoDepot Journals

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout RepoClerk
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Ensure update-request label exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create update-request \
            --repo "$GITHUB_REPOSITORY" \
            --color "0075ca" \
            --description "Queued journal update" 2>/dev/null || true

      - name: Discover live repos and queue/delete
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/sync-all.py

      - name: Generate dashboard
        run: python3 scripts/generate-dashboard.py

      - name: Commit and push dashboard
        run: |
          git add docs/
          git diff --cached --quiet && { echo "No dashboard changes"; exit 0; }
          git commit -m "Sync: regenerate dashboard"
          if git push; then exit 0; fi
          # Push rejected — undo commit, pull latest, regenerate fresh, push again.
          git reset --hard HEAD~1
          git pull --rebase
          python3 scripts/generate-dashboard.py
          git add docs/
          git diff --cached --quiet && { echo "No dashboard changes after pull"; exit 0; }
          git commit -m "Sync: regenerate dashboard"
          git push
